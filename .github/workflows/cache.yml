name: Cache Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: cache-7eeaebf

      - name: prime-cache-7eeaebf
        run: echo "Cache hit: ${{ steps.cache-deps.outputs.cache-hit }}"

      - name: Install dependencies
        run: pip install fastapi uvicorn